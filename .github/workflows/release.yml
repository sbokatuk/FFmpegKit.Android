name: release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "${version}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag '${GITHUB_REF_NAME}' does not look like a version (expected e.g. v8.1.7)"
            exit 1
          fi

          native=$(grep -oPm1 '(?<=<FFmpegKitNativeVersion>)[^<]+' Directory.Build.props)
          if [ "${version%%-*}" != "${native}" ]; then
            echo "::warning::tag version ${version} does not match FFmpegKitNativeVersion ${native}"
          fi

          case "${version}" in
            *-*) prerelease=true ;;
            *)   prerelease=false ;;
          esac

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${version} (prerelease=${prerelease})" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}

  publish:
    name: publish to nuget.org and create release
    needs: [version, build]
    runs-on: ubuntu-latest
    # Must match the Environment on the nuget.org trusted publishing policy for this workflow.
    environment: production
    permissions:
      # contents: write creates the GitHub release; id-token: write lets the job request the OIDC
      # token that nuget.org exchanges for a short-lived API key. Without the latter the token
      # request fails silently and the login step gets no key.
      contents: write
      id-token: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Needed to find the previous tag when generating the changelog.
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      # nuget.org is published to first: a GitHub release that links to packages which failed to
      # upload would be worse than a release that is created a moment late.
      # Deliberately immediately before the push: the issued key is valid for one hour, and each
      # OIDC token can be exchanged exactly once.
      - name: Authenticate to nuget.org
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Compose release notes
        run: |
          native=$(grep -oPm1 '(?<=<FFmpegKitNativeVersion>)[^<]+' Directory.Build.props)
          previous=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)

          {
            echo "## What's changed"
            echo
            if [ -n "${previous}" ]; then
              git log --no-merges --pretty='- %s (%h)' "${previous}..${GITHUB_REF_NAME}"
            else
              git log --no-merges --pretty='- %s (%h)' "${GITHUB_REF_NAME}"
            fi
            echo
            if [ -n "${previous}" ]; then
              echo "**Full changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/${previous}...${GITHUB_REF_NAME}"
              echo
            fi

            echo "## Packages"
            echo
            echo "Bound against FFmpegKit \`${native}\`, targeting \`net8.0-android34.0\`, \`net9.0-android35.0\` and \`net10.0-android36.0\`."
            echo
            echo "| Package | License | NuGet |"
            echo "| --- | --- | --- |"
            for variant in Audio Full FullGpl Https HttpsGpl Min MinGpl Video; do
              id="Xamarin.FFmpegKit.${variant}.Android"
              case "${variant}" in
                *Gpl) license="MIT AND GPL-3.0-only" ;;
                *)    license="MIT AND LGPL-3.0-only" ;;
              esac
              echo "| \`${id}\` | \`${license}\` | [${VERSION}](https://www.nuget.org/packages/${id}/${VERSION}) |"
            done
            echo
            echo "\`\`\`"
            echo "dotnet add package Xamarin.FFmpegKit.Video.Android --version ${VERSION}"
            echo "\`\`\`"
            echo
            echo "## Licensing"
            echo
            echo "The binding code is MIT, but the bundled native FFmpeg binaries are not."
            echo "The \`-gpl\` variants enable x264/x265/xvid/vidstab and are **GPL-3.0**; the rest"
            echo "are LGPL-3.0. If your app is closed-source, use a non-GPL variant."
            echo "Each package ships the applicable texts under \`licenses/\`."
          } > release-notes.md

          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The packages themselves are not attached: they are ~50 MB each and nuget.org is the
          # distribution channel. The notes link to every published package instead.
          gh release create "${GITHUB_REF_NAME}" \
            --title "${VERSION}" \
            --notes-file release-notes.md \
            ${{ needs.version.outputs.prerelease == 'true' && '--prerelease' || '' }}
