name: release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "${version}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag '${GITHUB_REF_NAME}' does not look like a version (expected e.g. v8.1.7)"
            exit 1
          fi

          native=$(grep -oPm1 '(?<=<FFmpegKitNativeVersion>)[^<]+' Directory.Build.props)
          if [ "${version%%-*}" != "${native}" ]; then
            echo "::warning::tag version ${version} does not match FFmpegKitNativeVersion ${native}"
          fi

          case "${version}" in
            *-*) prerelease=true ;;
            *)   prerelease=false ;;
          esac

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${version} (prerelease=${prerelease})" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}

  publish:
    name: publish to nuget.org and create release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Needed to find the previous tag when generating the changelog.
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      # nuget.org is published to first: a GitHub release that links to packages which failed to
      # upload would be worse than a release that is created a moment late.
      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "::error::NUGET_API_KEY secret is not configured"
            exit 1
          fi
          dotnet nuget push "artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${NUGET_API_KEY}" \
            --skip-duplicate

      - name: Compose release notes
        run: |
          native=$(grep -oPm1 '(?<=<FFmpegKitNativeVersion>)[^<]+' Directory.Build.props)
          previous=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)

          {
            echo "## What's changed"
            echo
            if [ -n "${previous}" ]; then
              git log --no-merges --pretty='- %s (%h)' "${previous}..${GITHUB_REF_NAME}"
            else
              git log --no-merges --pretty='- %s (%h)' "${GITHUB_REF_NAME}"
            fi
            echo
            if [ -n "${previous}" ]; then
              echo "**Full changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/${previous}...${GITHUB_REF_NAME}"
              echo
            fi

            echo "## Packages"
            echo
            echo "Bound against FFmpegKit \`${native}\`, targeting \`net8.0-android34.0\` and \`net9.0-android35.0\`."
            echo
            echo "| Package | NuGet |"
            echo "| --- | --- |"
            for variant in Audio Full FullGpl Https HttpsGpl Min MinGpl Video; do
              id="Xamarin.FFmpegKit.${variant}.Android"
              echo "| \`${id}\` | [${VERSION}](https://www.nuget.org/packages/${id}/${VERSION}) |"
            done
            echo
            echo "\`\`\`"
            echo "dotnet add package Xamarin.FFmpegKit.Video.Android --version ${VERSION}"
            echo "\`\`\`"
          } > release-notes.md

          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The packages themselves are not attached: they are ~50 MB each and nuget.org is the
          # distribution channel. The notes link to every published package instead.
          gh release create "${GITHUB_REF_NAME}" \
            --title "${VERSION}" \
            --notes-file release-notes.md \
            ${{ needs.version.outputs.prerelease == 'true' && '--prerelease' || '' }}
