name: release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      native-version: ${{ steps.resolve.outputs.native-version }}
      ffmpeg-version: ${{ steps.resolve.outputs.ffmpeg-version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "${version}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag '${GITHUB_REF_NAME}' does not look like a version (expected e.g. v8.1.7)"
            exit 1
          fi

          # Tags name the FFmpeg version, not FFmpegKit's: v8.1.2.4 is FFmpeg 8.1.2, binding
          # revision 4. The fourth component and any prerelease suffix are dropped to get the
          # FFmpeg version, which is then mapped to the FFmpegKit release that packages it -
          # FFmpeg 8.1.2 comes from FFmpegKit 8.1.7, and the .aar is named after the latter.
          ffmpeg_version=$(printf '%s' "${version%%-*}" | cut -d. -f1-3)

          if ! resolved=$(./build/resolve-versions.sh --ffmpeg "${ffmpeg_version}" 2>&1); then
            echo "::error::${resolved}"
            exit 1
          fi
          eval "${resolved}"

          echo "native-version=${ffmpegkit}" >> "$GITHUB_OUTPUT"
          echo "ffmpeg-version=${ffmpeg}" >> "$GITHUB_OUTPUT"
          echo "FFmpeg ${ffmpeg} (FFmpegKit ${ffmpegkit})" >> "$GITHUB_STEP_SUMMARY"

          case "${version}" in
            *-*) prerelease=true ;;
            *)   prerelease=false ;;
          esac

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${version} (prerelease=${prerelease})" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}
      native-version: ${{ needs.version.outputs.native-version }}

  publish:
    name: publish to nuget.org and create release
    needs: [version, build]
    runs-on: ubuntu-latest
    # Must match the Environment on the nuget.org trusted publishing policy for this workflow.
    environment: nuget.org
    permissions:
      # contents: write creates the GitHub release; id-token: write lets the job request the OIDC
      # token that nuget.org exchanges for a short-lived API key. Without the latter the token
      # request fails silently and the login step gets no key.
      contents: write
      id-token: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Needed to find the previous tag when generating the changelog.
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      # nuget.org is published to first: a GitHub release that links to packages which failed to
      # upload would be worse than a release that is created a moment late.
      # Deliberately immediately before the push: the issued key is valid for one hour, and each
      # OIDC token can be exchanged exactly once.
      - name: Authenticate to nuget.org
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Compose release notes
        env:
          # Lets the upstream release lookup use the authenticated rate limit.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Resolved from the tag, not Directory.Build.props, so a release of an older LTS line
          # reports the version it actually bound rather than whatever the branch defaults to.
          native="${{ needs.version.outputs.native-version }}"
          previous=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)

          # A curated docs/release-notes/<version>.md replaces the generated commit list when one
          # exists. The second lookup drops the prerelease suffix, so v8.1.7-beta.2 reuses the
          # notes written for 8.1.7 rather than silently falling back to raw commit subjects.
          notes="docs/release-notes/${VERSION}.md"
          [ -f "${notes}" ] || notes="docs/release-notes/${VERSION%%-*}.md"
          # Last resort, the native line itself: lets 6.0.3.2 reuse notes filed as 6.0.3.md.
          [ -f "${notes}" ] || notes="docs/release-notes/$(printf '%s' "${VERSION%%-*}" | cut -d. -f1-3).md"

          {
            if [ -f "${notes}" ]; then
              echo "==> using curated notes from ${notes}" >&2
              cat "${notes}"
            else
              echo "## What's changed"
              echo
              if [ -n "${previous}" ]; then
                git log --no-merges --pretty='- %s (%h)' "${previous}..${GITHUB_REF_NAME}"
              else
                # No previous tag: listing every commit would reach back to the repository's
                # first commit, which is noise rather than a changelog.
                echo "Initial release."
              fi
            fi
            echo
            if [ -n "${previous}" ]; then
              echo "**Full changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/${previous}...${GITHUB_REF_NAME}"
              echo
            fi

            # Describes the FFmpegKit build underneath, including the FFmpeg version it actually
            # packages. Best-effort: never fails the release.
            ./.github/scripts/native-build-info.sh "${native}" artifacts || true
            echo

            echo "## Packages"
            echo
            echo "Targeting \`net8.0-android34.0\`, \`net9.0-android35.0\` and \`net10.0-android36.0\`."
            echo
            echo "| Package | License | NuGet |"
            echo "| --- | --- | --- |"
            for variant in Audio Full FullGpl Https HttpsGpl Min MinGpl Video; do
              id="FFmpegKit.Net.${variant}.Android"
              case "${variant}" in
                *Gpl) license="MIT AND GPL-3.0-only" ;;
                *)    license="MIT AND LGPL-3.0-only" ;;
              esac
              echo "| \`${id}\` | \`${license}\` | [${VERSION}](https://www.nuget.org/packages/${id}/${VERSION}) |"
            done
            echo
            echo "\`\`\`"
            echo "dotnet add package FFmpegKit.Net.Video.Android --version ${VERSION}"
            echo "\`\`\`"
            echo
            echo "## Licensing"
            echo
            echo "The binding code is MIT, but the bundled native FFmpeg binaries are not."
            echo "The \`-gpl\` variants enable x264/x265/xvid/vidstab and are **GPL-3.0**; the rest"
            echo "are LGPL-3.0. If your app is closed-source, use a non-GPL variant."
            echo "Each package ships the applicable texts under \`licenses/\`."
          } > release-notes.md

          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The packages themselves are not attached: they are ~50 MB each and nuget.org is the
          # distribution channel. The notes link to every published package instead.
          gh release create "${GITHUB_REF_NAME}" \
            --title "${VERSION}" \
            --notes-file release-notes.md \
            ${{ needs.version.outputs.prerelease == 'true' && '--prerelease' || '' }}
