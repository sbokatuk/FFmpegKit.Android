name: build

# Reusable pipeline: builds every FFmpegKit variant at a given version, validates the packed
# packages, runs the on-device smoke tests, and uploads the packages as an artifact.
# Callers (pr.yml, release.yml) decide the version and what to do with the result.

on:
  workflow_call:
    inputs:
      version:
        description: NuGet version to stamp on every package.
        required: true
        type: string
      native-version:
        description: >
          FFmpegKit native version to bind against. Defaults to FFmpegKitNativeVersion in
          Directory.Build.props; set it to build a package for an older LTS line, e.g. 6.0.3.
        required: false
        default: ''
        type: string
      e2e-variant:
        description: Which variant the emulator smoke test installs and runs.
        required: false
        default: Video
        type: string
      e2e-target-framework:
        description: >
          Which of the package's target frameworks the emulator smoke test runs against.
          Defaults to net10, whose assets are produced by the merge step in BuildNugets.sh and so
          are the ones worth proving at runtime.
        required: false
        default: net10.0-android36.0
        type: string

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  pack:
    name: build and pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # 9.0.x packs net8+net9 (global.json pins it) and 10.0.x packs net10. 8.0.x is installed
          # only so that its Android workload band is available - see the workload step below.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install Android workloads for every SDK band
        run: |
          # Each band supplies different reference packs: net8.0-android34.0 compiles against
          # Microsoft.Android.Ref.34 from the .NET 8 band, net9.0-android35.0 against Ref.35 from
          # the .NET 9 band, and net10.0-android36.0 against Ref.36 from the .NET 10 band.
          # The SDK is chosen by the global.json in the working directory, so each band is
          # installed from a scratch directory pinned to that SDK.
          for major in 8 9 10; do
            dir="${RUNNER_TEMP}/sdk${major}"
            mkdir -p "${dir}"
            sdk=$(dotnet --list-sdks | grep "^${major}\." | tail -1 | cut -d' ' -f1)
            echo "installing android workload for SDK ${sdk}"
            ( cd "${dir}" \
              && dotnet new globaljson --sdk-version "${sdk}" --force \
              && dotnet workload install android )
          done

      - name: Set up Android SDK platforms
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 platforms;android-35 platforms;android-36'

      - name: Resolve native version
        id: native
        run: |
          version="${{ inputs.native-version }}"
          if [ -z "${version}" ]; then
            version=$(grep -oPm1 '(?<=<FFmpegKitNativeVersion>)[^<]+' Directory.Build.props)
          fi
          if [ -z "${version}" ]; then
            echo "::error::could not determine the FFmpegKit native version"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Binding FFmpegKit ${version}" >> "$GITHUB_STEP_SUMMARY"

      - name: Cache FFmpegKit binaries
        id: jars
        uses: actions/cache@v4
        with:
          path: FFmpegKit.Android/Jars
          # The native version is part of the key: without it a build for an older LTS line would
          # restore the previous version's .aar files and fail on the ones it actually needs.
          key: ffmpegkit-jars-${{ steps.native.outputs.version }}-${{ hashFiles('FFmpegKit.Android/Jars/FetchJars.sh') }}

      - name: Fetch FFmpegKit binaries
        if: steps.jars.outputs.cache-hit != 'true'
        run: ./FFmpegKit.Android/Jars/FetchJars.sh "${{ steps.native.outputs.version }}"

      - name: Pack all variants
        run: ./FFmpegKit.Android/BuildNugets.sh "${{ inputs.version }}" "${{ steps.native.outputs.version }}"

      - name: Validate packages
        run: dotnet test tests/FFmpegKit.Android.PackageTests --logger 'trx;LogFileName=package-tests.trx'

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-test-results
          path: '**/*.trx'
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: emulator smoke test
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Install Android workload
        run: |
          # The device app is built for the target framework under test, so install the workload
          # for the band that owns it. global.json pins .NET 9; the app may need .NET 10.
          mkdir -p "${RUNNER_TEMP}/sdk10"
          ( cd "${RUNNER_TEMP}/sdk10" \
            && dotnet new globaljson --sdk-version "$(dotnet --list-sdks | grep '^10\.' | tail -1 | cut -d' ' -f1)" --force \
            && dotnet workload install android )
          dotnet workload install android

      - name: Set up Android SDK platforms
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 platforms;android-36'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run smoke tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # The .aar ships arm64-v8a and x86_64 only, so the emulator must be x86_64.
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./.github/scripts/run-device-tests.sh "${{ inputs.e2e-variant }}" "${{ inputs.version }}" "${{ inputs.e2e-target-framework }}"

      - name: Upload device logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: device-test-logs
          path: device-tests-logcat.txt
          if-no-files-found: ignore
          retention-days: 7
