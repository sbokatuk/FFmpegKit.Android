name: build

# Reusable pipeline: builds every FFmpegKit variant at a given version, validates the packed
# packages, runs the on-device smoke tests, and uploads the packages as an artifact.
# Callers (pr.yml, release.yml) decide the version and what to do with the result.

on:
  workflow_call:
    inputs:
      version:
        description: NuGet version to stamp on every package.
        required: true
        type: string
      native-version:
        description: >
          FFmpegKit native version to bind against. Defaults to FFmpegKitNativeVersion in
          Directory.Build.props; set it to build a package for an older LTS line, e.g. 6.0.3.
        required: false
        default: ''
        type: string
      e2e-variant:
        description: Which variant the emulator smoke test installs and runs.
        required: false
        default: Video
        type: string
      e2e-target-frameworks:
        description: >
          Which of the package's target frameworks the emulator smoke test runs against, as a
          JSON array - one matrix job per entry. Defaults to the two extremes: net8, the oldest
          asset set and the one nothing else exercises, and net10, whose assets are produced by
          the merge step in BuildNugets.sh and so are the only ones that could be grafted in
          wrong. net9 sits between them and comes out of the same pack pass as net8, so testing
          it too would buy little for the runner minutes.
        required: false
        default: '["net8.0-android34.0", "net10.0-android36.0"]'
        type: string

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  pack:
    name: build and pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # 9.0.x packs net8+net9 (global.json pins it) and 10.0.x packs net10. 8.0.x is installed
          # only so that its Android workload band is available - see the workload step below.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install Android workloads for every SDK band
        run: |
          # Each band supplies different reference packs: net8.0-android34.0 compiles against
          # Microsoft.Android.Ref.34 from the .NET 8 band, net9.0-android35.0 against Ref.35 from
          # the .NET 9 band, and net10.0-android36.0 against Ref.36 from the .NET 10 band.
          # The SDK is chosen by the global.json in the working directory, so each band is
          # installed from a scratch directory pinned to that SDK.
          for major in 8 9 10; do
            dir="${RUNNER_TEMP}/sdk${major}"
            mkdir -p "${dir}"
            sdk=$(dotnet --list-sdks | grep "^${major}\." | tail -1 | cut -d' ' -f1)
            echo "installing android workload for SDK ${sdk}"
            ( cd "${dir}" \
              && dotnet new globaljson --sdk-version "${sdk}" --force \
              && dotnet workload install android )
          done

      - name: Set up Android SDK platforms
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 platforms;android-35 platforms;android-36'

      - name: Resolve native version
        id: native
        run: |
          version="${{ inputs.native-version }}"
          if [ -z "${version}" ]; then
            version=$(grep -oPm1 '(?<=<FFmpegKitNativeVersion>)[^<]+' Directory.Build.props)
          fi
          if [ -z "${version}" ]; then
            echo "::error::could not determine the FFmpegKit native version"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Binding FFmpegKit ${version}" >> "$GITHUB_STEP_SUMMARY"

      - name: Cache FFmpegKit binaries
        id: jars
        uses: actions/cache@v4
        with:
          path: src/FFmpegKit.Android/Jars
          # The native version is part of the key: without it a build for an older LTS line would
          # restore the previous version's .aar files and fail on the ones it actually needs.
          key: ffmpegkit-jars-${{ steps.native.outputs.version }}-${{ hashFiles('src/FFmpegKit.Android/Jars/FetchJars.sh') }}

      - name: Fetch FFmpegKit binaries
        if: steps.jars.outputs.cache-hit != 'true'
        run: ./src/FFmpegKit.Android/Jars/FetchJars.sh "${{ steps.native.outputs.version }}"

      # Runs on cache hits too: the fetch already verifies fresh downloads, but a restored
      # cache is only as trustworthy as its last write. Seconds of hashing per build.
      - name: Verify FFmpegKit binaries
        run: ./src/FFmpegKit.Android/Jars/FetchJars.sh --verify "${{ steps.native.outputs.version }}"

      - name: Pack all variants
        run: ./src/FFmpegKit.Android/BuildNugets.sh "${{ inputs.version }}" "${{ steps.native.outputs.version }}"

      - name: Validate packages
        run: dotnet test tests/FFmpegKit.Android.PackageTests --logger 'trx;LogFileName=package-tests.trx'

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-test-results
          path: '**/*.trx'
          if-no-files-found: ignore
          retention-days: 7

  sample:
    name: build sample app
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Set up Android SDK platforms
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      # The sample consumes the packed package through a PackageReference exactly as a user
      # would, so it is the only thing here that checks the API is still usable the way the
      # README documents it. It has regressed silently twice: once when a renamed property left
      # it referring to something that no longer existed, and once when it resolved a published
      # package from nuget.org instead of the one just built, because its version property
      # pointed at the wrong number. Nothing built it, so nothing noticed.
      #
      # Build only - the device tests already prove the binding runs.
      - name: Build the sample against the packed package
        run: |
          dotnet build samples/FFmpegKit.Android.Example/FFmpegKit.Android.Example.csproj \
            --configuration Release \
            -p:FFmpegKitVersion="${{ inputs.version }}"

  e2e:
    name: emulator smoke test (${{ matrix.target-framework }})
    timeout-minutes: 60
    needs: pack
    runs-on: ubuntu-latest
    strategy:
      # fail-fast off: when one target framework breaks it is worth knowing whether the other did
      # too, since "net8 only" and "both" point at very different causes.
      fail-fast: false
      matrix:
        target-framework: ${{ fromJSON(inputs.e2e-target-frameworks) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # 8.0.x is here for the net8 matrix leg only - see the workload step below.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install the Android workload for every SDK band
        run: |
          # One band per Android API level, because that is what owns the runtime packs: API 34 is
          # the .NET 8 workload, 35 the .NET 9 one, 36 the .NET 10 one. Installing only the band
          # global.json pins lets a net8 app compile and then fail at packaging with NETSDK1112.
          # See the comment in run-device-tests.sh.
          for major in 8 10; do
            dir="${RUNNER_TEMP}/sdk${major}"
            mkdir -p "${dir}"
            ( cd "${dir}" \
              && dotnet new globaljson --sdk-version "$(dotnet --list-sdks | grep "^${major}\." | tail -1 | cut -d' ' -f1)" --force \
              && dotnet workload install android )
          done
          dotnet workload install android

      - name: Set up Android SDK platforms
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 platforms;android-35 platforms;android-36'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run smoke tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # The .aar ships arm64-v8a and x86_64 only, so the emulator must be x86_64.
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./.github/scripts/run-device-tests.sh "${{ inputs.e2e-variant }}" "${{ inputs.version }}" "${{ matrix.target-framework }}"

      - name: Upload device logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: device-test-logs-${{ matrix.target-framework }}
          path: device-tests-logcat.txt
          if-no-files-found: ignore
          retention-days: 7
